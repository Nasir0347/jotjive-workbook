<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
  <div class="relative">
    <button id="trigger" class="px-4 py-2 bg-blue-500 text-white rounded">
      Click Me
    </button>
    <div id="dropdown" class="hidden absolute top-full mt-2 left-0 bg-white border-2 border-slate-200 rounded-xl shadow-2xl z-[9999] w-64 p-4">
      <div class="text-sm">Dropdown Content</div>
      <div class="text-xs text-slate-500">This should appear</div>
    </div>
  </div>
  <script>
    document.getElementById('trigger').addEventListener('click', function() {
      const dropdown = document.getElementById('dropdown');
      dropdown.classList.toggle('hidden');
    });
  </script>
</body>
</html>
